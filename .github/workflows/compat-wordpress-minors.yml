name: WordPress Compat Sweep

on:
  workflow_dispatch:
  schedule:
    - cron: '30 5 * * 3'

jobs:
  integration-compat:
    name: "Compat Sweep (PHP 8.1, WP ${{ matrix.wp }}, ${{ matrix.db_label }})"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - wp: '6.3'
            db_label: 'MySQL 8.0'
            db_image: 'mysql:8.0'
          - wp: '6.4'
            db_label: 'MySQL 8.0'
            db_image: 'mysql:8.0'
          - wp: '6.5'
            db_label: 'MySQL 8.0'
            db_image: 'mysql:8.0'
          - wp: '6.6'
            db_label: 'MySQL 8.0'
            db_image: 'mysql:8.0'
          - wp: '6.4'
            db_label: 'MariaDB LTS'
            db_image: 'mariadb:lts'
    services:
      db:
        image: ${{ matrix.db_image }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_ROOT_HOST: '%'
          MYSQL_DATABASE: wordpress_test
          MARIADB_ROOT_PASSWORD: root
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: 'yes'
          MARIADB_AUTO_UPGRADE: '1'
        ports:
          - 3306:3306
        options: ${{ matrix.db_image == 'mariadb:lts' && '--health-cmd="healthcheck.sh --connect --innodb_initialized" --health-interval=5s --health-timeout=10s --health-retries=12 --health-start-period=60s' || '--health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5' }}
    env:
      WP_TESTS_DIR: /tmp/wordpress-tests-lib
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install SVN and unzip
        run: sudo apt-get update && sudo apt-get install -y subversion unzip

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2
          extensions: mysqli
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install WordPress test suite
        env:
          WP_SUDO_FORCE_DROP_DB: '1'
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 ${{ matrix.wp }}

      - name: Run integration tests
        run: composer test:integration
