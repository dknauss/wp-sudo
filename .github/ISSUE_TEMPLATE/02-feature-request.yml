name: Feature request
description: Suggest an improvement to the plugin, docs, or workflows.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the action gate, integration, documentation, or workflow improvement you want.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include references, prior art, or related WordPress security projects when relevant.
